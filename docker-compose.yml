version: '3.8'

services:

  app:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_TRANSLATE_URL: http://libretranslate:5000

    ports:
      - "8080:80"

    depends_on:
      - libretranslate

    networks:
      - platform-network

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:latest

    container_name: libretranslate

    ports:
      - "5000:5000"

    environment:
      - LT_LOAD_ONLY=en,fr,pt,ar
      - LT_UPDATE_MODELS=true
      - LT_DISABLE_WEB_UI=true

    volumes:
      - lt-data:/home/libretranslate/.local

    networks:
      - platform-network

    restart: unless-stopped

networks:
  platform-network:
    driver: bridge

volumes:
  lt-data: